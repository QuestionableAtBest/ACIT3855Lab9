#Use docker-compose up -d in this file directory to start it up.
services:
  receiver:
    build:
      context: ../receiver
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: ../logs/
        target: /app/logs/
    depends_on:
      - kafka
  storage:
    build:
      context: ../storage
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ../logs/
        target: /app/logs/
    depends_on:
      - db
      - kafka
  processing:
    build:
      context: ../processing
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - type: bind
        source: ../logs/
        target: /app/logs/
      - type: bind
        source: ../data/
        target: /app/data/
    depends_on:
      - db
  analyzer:
    build:
      context: ../analyzer
      dockerfile: Dockerfile
    ports:
      - "8110:8110"
    volumes:
      - type: bind
        source: ../logs/
        target: /app/logs/
    depends_on:
      - kafka
  zookeeper:
    image: wurstmeister/zookeeper
    volumes:
      - zookeeper_db:/data
  kafka:
    image: wurstmeister/kafka
    command: [start-kafka.sh]
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1" # topic:partition:replicas
      KAFKA_ADVERTISED_HOST_NAME: localhost # docker-machine ip
      KAFKA_LISTENERS: INSIDE://:29092,OUTSIDE://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../data/kafka/:/kafka
    depends_on:
      - "zookeeper"
  db:
    image: mysql
    restart: always
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
      MYSQL_USER: harry
      MYSQL_PASSWORD: harry
      MYSQL_DATABASE: fitscale
    ports:
      - 3306:3306
    volumes:
      # Where our data will be persisted
      - ../data/database/:/var/lib/mysql
volumes:
  zookeeper_db